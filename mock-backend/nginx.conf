events { worker_connections 64; }

http {
  default_type application/json;
  log_format main '$remote_addr "$request" $status';
  access_log /dev/stdout main;

  server {
    listen 80;

    location /api/conversations {
      return 200 '{"data": [{"id": "conv-1", "title": "Support session", "tenant": "acme"}]}';
    }

    location /api/agents/run {
      return 200 '{"status": "queued", "agent_id": "agent-acme-001", "job_id": "job-42"}';
    }

    location /api/knowledge {
      return 200 '{"data": [{"id": "kb-1", "title": "Platform docs", "visibility": "global"}]}';
    }

    location /api/admin {
      return 200 '{"status": "ok", "section": "admin"}';
    }

    location / {
      return 404 '{"error": "not found"}';
    }
  }
}
